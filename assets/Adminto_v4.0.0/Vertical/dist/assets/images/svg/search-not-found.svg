<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8f9fa"/>
  
  <!-- Magnifying Glass -->
  <g transform="translate(150, 80)">
    <!-- Handle -->
    <line x1="60" y1="60" x2="90" y2="90" stroke="#6c757d" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Glass Circle -->
    <circle cx="40" cy="40" r="35" fill="none" stroke="#6c757d" stroke-width="6"/>
    
    <!-- X Mark inside glass -->
    <line x1="25" y1="25" x2="55" y2="55" stroke="#dc3545" stroke-width="4" stroke-linecap="round"/>
    <line x1="55" y1="25" x2="25" y2="55" stroke="#dc3545" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Document/File Icon -->
  <g transform="translate(220, 100)">
    <rect x="0" y="0" width="50" height="65" rx="3" fill="#e9ecef" stroke="#adb5bd" stroke-width="2"/>
    <line x1="10" y1="15" x2="40" y2="15" stroke="#adb5bd" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="25" x2="40" y2="25" stroke="#adb5bd" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="35" x2="30" y2="35" stroke="#adb5bd" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="100" cy="200" r="4" fill="#dee2e6"/>
  <circle cx="120" cy="210" r="3" fill="#dee2e6"/>
  <circle cx="280" cy="200" r="4" fill="#dee2e6"/>
  <circle cx="300" cy="210" r="3" fill="#dee2e6"/>
  
  <!-- Text -->
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="18" fill="#6c757d" text-anchor="middle" font-weight="600">
    Tidak Ada Data
  </text>
  <text x="200" y="275" font-family="Arial, sans-serif" font-size="14" fill="#adb5bd" text-anchor="middle">
    Data yang Anda cari tidak ditemukan
  </text>
</svg>
