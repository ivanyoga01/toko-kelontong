<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8f9fa"/>
  
  <!-- Folder Icon -->
  <g transform="translate(150, 90)">
    <!-- Folder Tab -->
    <path d="M 0 10 L 0 0 L 40 0 L 50 10 Z" fill="#adb5bd"/>
    
    <!-- Folder Body -->
    <rect x="0" y="10" width="100" height="70" rx="5" fill="#e9ecef" stroke="#adb5bd" stroke-width="2"/>
    
    <!-- Empty indicator -->
    <line x1="20" y1="35" x2="80" y2="35" stroke="#dee2e6" stroke-width="3" stroke-linecap="round" stroke-dasharray="5,5"/>
    <line x1="30" y1="50" x2="70" y2="50" stroke="#dee2e6" stroke-width="3" stroke-linecap="round" stroke-dasharray="5,5"/>
    <line x1="35" y1="65" x2="65" y2="65" stroke="#dee2e6" stroke-width="3" stroke-linecap="round" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Question Mark -->
  <g transform="translate(280, 130)">
    <circle cx="0" cy="0" r="20" fill="#6c757d" opacity="0.2"/>
    <text x="0" y="8" font-family="Arial, sans-serif" font-size="28" fill="#6c757d" text-anchor="middle" font-weight="bold">?</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="210" r="4" fill="#dee2e6"/>
  <circle cx="120" cy="220" r="3" fill="#dee2e6"/>
  <circle cx="280" cy="210" r="4" fill="#dee2e6"/>
  <circle cx="300" cy="220" r="3" fill="#dee2e6"/>
  
  <!-- Text -->
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="18" fill="#6c757d" text-anchor="middle" font-weight="600">
    Belum Ada Data
  </text>
  <text x="200" y="275" font-family="Arial, sans-serif" font-size="14" fill="#adb5bd" text-anchor="middle">
    Silakan tambahkan data terlebih dahulu
  </text>
</svg>
