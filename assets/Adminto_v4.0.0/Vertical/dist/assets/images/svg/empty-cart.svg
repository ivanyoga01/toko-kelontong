<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8f9fa"/>
  
  <!-- Shopping Cart -->
  <g transform="translate(150, 80)">
    <!-- Cart Body -->
    <path d="M 10 20 L 20 60 L 80 60 L 90 20 Z" fill="none" stroke="#6c757d" stroke-width="4" stroke-linejoin="round"/>
    
    <!-- Cart Handle -->
    <path d="M 10 20 L 5 10 L 0 10" fill="none" stroke="#6c757d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Cart Wheels -->
    <circle cx="30" cy="75" r="6" fill="#6c757d"/>
    <circle cx="70" cy="75" r="6" fill="#6c757d"/>
    
    <!-- Empty indicator lines -->
    <line x1="30" y1="35" x2="70" y2="35" stroke="#dee2e6" stroke-width="3" stroke-linecap="round" stroke-dasharray="5,5"/>
    <line x1="35" y1="45" x2="65" y2="45" stroke="#dee2e6" stroke-width="3" stroke-linecap="round" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Sad Face -->
  <g transform="translate(280, 120)">
    <circle cx="0" cy="0" r="25" fill="#e9ecef" stroke="#adb5bd" stroke-width="2"/>
    <circle cx="-8" cy="-5" r="3" fill="#6c757d"/>
    <circle cx="8" cy="-5" r="3" fill="#6c757d"/>
    <path d="M -10 10 Q 0 5 10 10" fill="none" stroke="#6c757d" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="200" r="4" fill="#dee2e6"/>
  <circle cx="120" cy="210" r="3" fill="#dee2e6"/>
  <circle cx="280" cy="200" r="4" fill="#dee2e6"/>
  <circle cx="300" cy="210" r="3" fill="#dee2e6"/>
  
  <!-- Text -->
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="18" fill="#6c757d" text-anchor="middle" font-weight="600">
    Keranjang Kosong
  </text>
  <text x="200" y="275" font-family="Arial, sans-serif" font-size="14" fill="#adb5bd" text-anchor="middle">
    Belum ada produk di keranjang
  </text>
</svg>
